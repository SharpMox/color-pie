<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Color Pie Explorer — Effects by Color</title>
<meta name="description" content="Browse Magic: The Gathering's color pie — effects organized by color and tier (primary, secondary, tertiary) with example cards, filters, and search."/>
<link rel="stylesheet" href="assets/site.css"/>
<style>
/* ===== Layout ===== */
.wrap { max-width: 1100px; margin: 0 auto; padding: 14px 16px 60px; --cols: minmax(0,1fr) 100px 88px 88px 88px; }

/* ===== Controls ===== */
.controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.ctl-label { font-size: 12px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; margin: 0 0 6px; }

/* Color picker */
.picker { display: flex; flex-wrap: wrap; gap: 8px; }
.pick {
  min-width: 46px; min-height: 46px; padding: 0 10px;
  border: 2px solid var(--col); border-radius: 12px;
  background: var(--surface); color: var(--col);
  font-size: 15px; font-weight: 700; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.pick[aria-pressed="true"] { border-color: var(--col); box-shadow: 0 0 0 2px var(--col) inset; background: var(--col); color: var(--col-ink); }
.pick.W{--col:var(--c-W);--col-ink:var(--c-W-ink)} .pick.U{--col:var(--c-U);--col-ink:var(--c-U-ink)}
.pick.B{--col:var(--c-B);--col-ink:var(--c-B-ink)} .pick.R{--col:var(--c-R);--col-ink:var(--c-R-ink)}
.pick.G{--col:var(--c-G);--col-ink:var(--c-G-ink)} .pick.C{--col:var(--c-C);--col-ink:var(--c-C-ink)}

/* Picker + search share a row on desktop, wrap to 2 lines on mobile */
.pickrow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.pickrow .picker { flex: 0 0 auto; }
.search { flex: 1 1 260px; min-height: 46px; padding: 0 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); }

/* Filter bar: TIER / Type / Category / More Filters on one wrapping row */
.filterbar { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: flex-end; }
.fld { display: flex; flex-direction: column; gap: 4px; }
.fld > .ctl-label { margin: 0; }
.seg { display: inline-flex; flex-wrap: wrap; gap: 6px; }
.seg button {
  min-height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 999px;
  background: var(--surface); color: var(--text-soft); font-size: 13px; font-weight: 600; cursor: pointer;
}
.seg button[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
select.mini { min-height: 38px; padding: 0 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; }
details.more { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); }
details.more > summary { min-height: 38px; padding: 0 12px; display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-soft); list-style: none; }
details.more > summary::-webkit-details-marker { display: none; }
details.more > summary::before { content: '☰ '; margin-right: 6px; }
details.more[open] { flex-basis: 100%; padding: 0 12px 12px; }
details.more .sub { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; margin: 10px 0 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { min-height: 34px; padding: 0 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-soft); font-size: 13px; font-weight: 600; cursor: pointer; }
.chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

.count { font-size: 13px; color: var(--text-soft); margin: 4px 0 6px; }

/* ===== Column header + rows (shared grid template via --cols) ===== */
.list-head, .row { display: grid; grid-template-columns: var(--cols); gap: 4px 8px; align-items: center; }
.list-head {
  position: sticky; top: 0; z-index: 40;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 8px 15px; margin-bottom: 6px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-soft);
}
.list-head .th-tier { text-align: center; }
.list-head .abbr { display: none; }
.list { display: flex; flex-direction: column; gap: 6px; }
.group-head { display: flex; align-items: center; gap: 10px; margin: 14px 0 0; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-soft); }
.group-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.group-head.fo-label { margin-top: 24px; }
.filtered-out { display: flex; flex-direction: column; gap: 6px; opacity: .4; }
/* Variant group: a native <details> frames the rows; <summary> is the base-name
   header (collapsed by default, auto-opened while filtering). */
/* block, not flex: a closed <details> keeps hidden rows as 0-height flex items, so flex
   gap adds phantom space below the summary; row spacing is explicit margin instead. */
details.group { display: block; }
/* collapsed: summary is a row (base name + shared P/S/T), same grid/height as a .row */
details.group > summary { display: grid; grid-template-columns: var(--cols); gap: 4px 8px; align-items: center; padding: 10px 14px; cursor: pointer; list-style: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
details.group > summary::-webkit-details-marker { display: none; }
details.group > summary:hover { border-color: var(--accent); }
details.group > summary .row-name::before { content: ''; display: inline-block; vertical-align: middle; margin-right: 8px; width: 0; height: 0; border: 5px solid transparent; border-left: 7px solid var(--text-soft); border-right: 0; transition: transform .12s; }
details.group[open] > summary .row-name::before { transform: rotate(90deg); }
/* expanded: the <details> becomes a frame wrapping the rows; header drops its P/S/T + chrome */
details.group[open] { border: 1px solid var(--border); border-radius: 12px; padding: 6px; }
details.group[open] > summary { border: 0; background: transparent; }
details.group[open] > summary .tier-cell,
details.group[open] > summary .review-cell,
details.group[open] > summary .row-tags { display: none; }
details.group[open] > .row { margin-top: 6px; }
.row {
  width: 100%; text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 10px 14px; color: var(--text);
}
.row:hover { border-color: var(--accent); }
.row.grouped { border-color: var(--border); }   /* variant rows sit inside the open group frame */
.cell-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.row-name { font-size: 14.5px; font-weight: 600; }
.row-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; color: var(--text-soft); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; }
.tier-cell { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.badge {
  font-size: 12px; font-weight: 700; border-radius: 999px; min-width: 24px; height: 24px; padding: 0 6px;
  background: var(--col); color: var(--col-ink); display: inline-flex; align-items: center; justify-content: center;
}
.badge.W{--col:var(--c-W);--col-ink:var(--c-W-ink)} .badge.U{--col:var(--c-U);--col-ink:var(--c-U-ink)}
.badge.B{--col:var(--c-B);--col-ink:var(--c-B-ink)} .badge.R{--col:var(--c-R);--col-ink:var(--c-R-ink)}
.badge.G{--col:var(--c-G);--col-ink:var(--c-G-ink)} .badge.C{--col:var(--c-C);--col-ink:var(--c-C-ink)}
.badge.Y{--col:var(--c-Y);--col-ink:var(--c-Y-ink)}
.empty { color: var(--text-soft); padding: 30px 10px; text-align: center; }

/* ===== Detail dialog ===== */
dialog.detail { border: none; border-radius: 16px; padding: 0; background: var(--surface); color: var(--text); box-shadow: var(--shadow); max-width: 1100px; width: calc(100% - 24px); }
dialog.detail::backdrop { background: rgba(0,0,0,.5); }
.detail-head { position: sticky; top: 0; z-index: 1; background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; }
.detail-head-row { display: flex; align-items: flex-start; gap: 10px; }
.detail-head h2 { margin: 0; font-size: 18px; }
.detail-head .tag { margin-top: 4px; }
.detail-head .rationale { margin: 10px 0 0; color: var(--text); }
.detail-head .detail-meta { margin: 10px 0 0; }
#d-type, .detail-meta .tag { font-size: 14px; color: var(--text-soft); }
.detail-close { width: 38px; height: 38px; flex: none; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text); font-size: 18px; cursor: pointer; }
.detail-body { padding: 14px 16px 20px; }
.detail-body .rationale { margin: 0 0 14px; color: var(--text); }
.detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 16px; }
.color-sec { margin: 0; padding: 12px 14px; border-radius: 10px; }  /* base = current modal bg */
.color-sec.alt { background: var(--bg); }                          /* alternate row shade = main page bg (theme-aware) */
.color-sec h3 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
.color-sec .tierlab { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
.tier-primary { background: var(--tier-primary); color: #06210f; }
.tier-secondary { background: var(--tier-secondary); color: #2a1402; }
.tier-tertiary { background: var(--tier-tertiary); color: #14171c; }
.tier-off { background: transparent; color: var(--text-soft); border: 1px dashed var(--border); }
.art-strip { display: flex; flex-wrap: wrap; gap: 12px; }
fieldset.art { border: 1px solid var(--border); border-radius: 10px; margin: 0; padding: 8px; width: auto; text-align: center; }
fieldset.art > legend { margin: 0 auto; padding: 0 8px; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-soft); }
fieldset.art.brk { border-color: var(--c-R); }
fieldset.art.brk > legend { color: var(--c-R); }
fieldset.art.bnd { border-color: #e08a2e; }
fieldset.art.bnd > legend { color: #e08a2e; }
.art img { width: 182px; max-width: 100%; border-radius: 9px; display: block; background: var(--surface-2); aspect-ratio: 488/680; object-fit: cover; cursor: zoom-in; }
.img-preview { position: fixed; z-index: 80; width: 420px; max-width: 46vw; border-radius: 14px; border: 1px solid var(--border); box-shadow: var(--shadow); background: var(--surface-2); aspect-ratio: 488/680; object-fit: cover; pointer-events: none; }
.art .cname { font-size: 12px; margin: 6px 0 0; }
.no-art { color: var(--text-soft); font-size: 13px; }
/* Bend/Break: each card is an image-width tile (left-aligned), image + title/desc centered inside */
fieldset.art.bb-sec { width: 100%; }
.bb-cards { display: flex; flex-wrap: wrap; row-gap: 16px; }   /* bend/break cards in a wrapping row */
.bb-row + .bb-row { border-left: 1px solid var(--border); margin-left: 16px; padding-left: 16px; }   /* separator between cards */
.bb-row { display: flex; align-items: flex-start; gap: 10px; width: 360px; max-width: 100%; }   /* card: image+title (left) · description (right) */
.bb-card { width: 130px; flex: none; text-align: center; }
.bb-card img { width: 130px; max-width: 100%; }
.bb-note { flex: 1; min-width: 0; text-align: left; margin: 0; color: var(--text-soft); font-size: 12px; }   /* description on the right */

/* Review affordance (row pill + modal button) */
.review-cell { display: flex; justify-content: center; align-items: center; }
.review { font-size: 11px; font-weight: 600; color: var(--accent); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
.review:hover { border-color: var(--accent); }
.review.review-disabled { color: var(--text-soft); }  /* group summary: click expands to reveal each variant's review button */
.review.has-accepted, .detail-review.has-accepted { color: var(--c-G); border-color: var(--c-G); }  /* ≥1 accepted feedback */
.detail-review { min-height: 38px; padding: 0 14px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
.detail-review:hover { border-color: var(--accent); }
.detail-scryfall { margin-left: auto; min-height: 38px; padding: 0 14px; border-radius: 9px; background: transparent; color: #6a5acd; font-size: 13px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; border: 1px solid #6a5acd; }  /* Scryfall: purple outline + purple label; first of the right group (Scryfall · Review · ×) */
.detail-scryfall:hover { background: rgba(106,90,205,.12); }
.detail-scryfall[hidden] + .detail-review { margin-left: auto; }   /* fallback: no Scryfall → Review right-aligns */

/* ===== Mobile: stack rows (name on top, tags + labeled P/S/T columns below) ===== */
@media (max-width: 560px) {
  .list-head { display: none; }                 /* tabular header doesn't map to stacked rows */
  .row, details.group > summary { grid-template-columns: repeat(4, 1fr); row-gap: 10px; padding: 12px; }
  .cell-main { grid-column: 1 / -1; }            /* name + tags take the full first line */
  .review-cell { justify-content: flex-start; }
  .row-name { font-size: 13.5px; }
  .tier-cell { display: block; text-align: center; }
  .tier-cell::before { content: attr(data-label); display: block; font-size: 10px; font-weight: 700; color: var(--text-soft); margin-bottom: 3px; }
  .tier-cell:empty::after { content: '—'; color: var(--text-soft); }
  .badge { font-size: 11px; min-width: 20px; height: 20px; padding: 0 3px; }
  /* Picker fills line 1 with 6 equal-width buttons (fits down to 320px),
     search drops to line 2. */
  .pickrow .picker { flex: 1 1 100%; gap: 4px; }
  .pick { flex: 1 1 0; min-width: 0; padding: 0 4px; gap: 3px; font-size: 13px; }
  .search { flex: 1 1 100%; }

  /* ----- Detail modal: full-screen on phones; title on its own full-width row below the
     buttons; only the button+title header stays sticky (rationale, meta, body scroll);
     smaller fonts ----- */
  dialog.detail { width: 100%; max-width: none; height: 100%; max-height: 100%; margin: 0; border-radius: 0; }
  /* display:contents promotes the head-row to a direct child of the scrolling dialog, so
     its sticky pin holds for the whole scroll (a sticky child only pins while its parent
     is in view — a short .detail-head parent would let it scroll away). */
  .detail-head { display: contents; }
  .detail-head-row {
    position: sticky; top: 0; z-index: 2;
    flex-wrap: wrap; gap: 6px 8px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 14px;
  }
  .detail-head-row > div { order: 2; flex: 1 1 100%; }   /* title block drops below the button row */
  .detail-scryfall { margin-left: 0; }                   /* mobile: Scryfall + Review align left… */
  .detail-close { margin-left: auto; }                   /* …and the close × stays top-right */
  .detail-head .rationale { padding: 12px 14px 0; margin: 0; font-size: 14px; }   /* now outside the sticky header → scrolls */
  .detail-head .detail-meta { padding: 0 14px; margin: 10px 0 16px; }
  .detail-head h2 { font-size: 16px; }
  #d-type, .detail-meta .tag { font-size: 13px; }
  #d-type { display: inline-block; margin: 12px 0 0 14px; }   /* moved out of the sticky header → scrolls under the title */
  .detail-body { padding: 12px 14px 18px; }
  .detail-body .color-sec h3 { font-size: 13px; }
}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <h1 class="site-title">Color Pie <small>· Effects by Color</small></h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">◐</button>
  </div>
</header>

<main class="wrap">
  <div class="controls">
    <div>
      <p class="ctl-label">Pick color(s)</p>
      <div class="pickrow">
        <div class="picker" id="picker"></div>
        <input type="search" class="search" id="search" placeholder="Search effects, rationale, card names…" aria-label="Search effects"/>
      </div>
    </div>
    <div class="filterbar">
      <div class="fld">
        <p class="ctl-label">Tier <span id="tier-note" class="tag" hidden>pick a color first</span></p>
        <div class="seg" id="tier">
          <button data-tier="all" aria-pressed="true">All</button>
          <button data-tier="primary" aria-pressed="false">Primary</button>
          <button data-tier="secondary" aria-pressed="false">Secondary</button>
          <button data-tier="tertiary" aria-pressed="false">Tertiary</button>
          <button data-tier="offpie" aria-pressed="false">Off-pie</button>
        </div>
      </div>
      <div class="fld">
        <p class="ctl-label">Type</p>
        <select class="mini" id="f-type" aria-label="Filter by type"></select>
      </div>
      <div class="fld">
        <p class="ctl-label">Category</p>
        <select class="mini" id="f-cat" aria-label="Filter by category"></select>
      </div>
      <details class="more">
        <summary>More Filters</summary>
        <p class="sub">Interaction</p><div class="chips" id="f-interaction"></div>
        <p class="sub">Duration</p><div class="chips" id="f-duration"></div>
        <p class="sub">Base keyword</p><div class="chips" id="f-baseKeyword"></div>
      </details>
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="list-head" id="list-head">
    <span>Effect</span>
    <span class="th-tier">Review</span>
    <span class="th-tier"><span class="full">Primary</span><span class="abbr">P</span></span>
    <span class="th-tier"><span class="full">Secondary</span><span class="abbr">S</span></span>
    <span class="th-tier"><span class="full">Tertiary</span><span class="abbr">T</span></span>
  </div>
  <div class="list" id="list"></div>
  <footer class="site-footer">
    <p class="ff-credit">By<br/><span class="ff-names">Sharpmax · Bookwyrm · Xavion</span></p>
  </footer>
</main>

<dialog class="detail" id="detail">
  <div class="detail-head">
    <div class="detail-head-row">
      <div>
        <h2 id="d-title"></h2>
        <span class="tag" id="d-type"></span>
      </div>
      <a class="detail-scryfall" id="d-scryfall" href="#" target="_blank" rel="noopener" hidden>Scryfall</a>
      <a class="detail-review" id="d-review" href="#">Review</a>
      <button class="detail-close" id="d-close" aria-label="Close">×</button>
    </div>
    <p class="rationale" id="d-rationale"></p>
    <div class="detail-meta" id="d-meta"></div>
  </div>
  <div class="detail-body" id="d-body"></div>
  <img id="img-preview" class="img-preview" alt="" hidden/>
</dialog>

<script src="data/colorpie.js"></script>
<script src="assets/theme.js"></script>
<script>
(function () {
  var COLORS = [
    { k:'W', name:'White',     glyph:'⚪' },
    { k:'U', name:'Blue',      glyph:'🔵' },
    { k:'B', name:'Black',     glyph:'⚫' },
    { k:'R', name:'Red',       glyph:'🔴' },
    { k:'G', name:'Green',     glyph:'🟢' },
    { k:'C', name:'Colorless', glyph:'◇' }
  ];
  var TIERWORD = { primary:'Primary', secondary:'Secondary', tertiary:'Tertiary' };
  var ARCH = { onRate:'On-rate', cheapest:'Cheapest', outdated:'Outdated', iconic:'Iconic', bend:'Bend', breaks:'Break' };

  // ----- State -----
  var selected = new Set(['W','U','B','R','G','C']);   // all colors on by default
  var tier = 'all';
  var query = '';
  var fbCounts = {};   // effect id -> feedback count; filled async by the feedback module
  var filt = { type:'', category:'', interaction:new Set(), duration:new Set(), baseKeyword:new Set() };

  // ----- Filter persistence (localStorage) -----
  var LS_KEY = 'colorpie.filters';
  function saveFilters() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        selected: [...selected], query: query, tier: tier,
        type: filt.type, category: filt.category,
        interaction: [...filt.interaction], duration: [...filt.duration], baseKeyword: [...filt.baseKeyword]
      }));
    } catch (e) { /* private mode / quota — persistence is best-effort */ }
  }
  function restoreFilters() {
    try {
      var s = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); if (!s) return;
      if (Array.isArray(s.selected)) selected = new Set(s.selected);
      if (typeof s.query === 'string') query = s.query;
      if (typeof s.tier === 'string') tier = s.tier;
      filt.type = s.type || ''; filt.category = s.category || '';
      filt.interaction = new Set(s.interaction || []);
      filt.duration = new Set(s.duration || []);
      filt.baseKeyword = new Set(s.baseKeyword || []);
    } catch (e) { /* corrupt/blocked — fall back to defaults */ }
  }
  restoreFilters();   // before controls build, so picker/tier-note come up correct

  // ----- Build groups: effects sharing a `base` label, first-appearance order.
  // `base` is a grouping label (the Ranking relation), not necessarily a real
  // effect row; the first member of each group is its anchor (summary row). -----
  COLORPIE.forEach(function (e, i) { e._i = i; });
  var byBase = {}, order = [];
  COLORPIE.forEach(function (e) {
    if (!byBase[e.base]) { byBase[e.base] = { base:e.base, members:[] }; order.push(e.base); }
    byBase[e.base].members.push(e);
  });
  var GROUPS = order.map(function (b) { return byBase[b]; });

  // ----- Helpers -----
  function haystack(e) {
    var s = e.title + ' ' + (e.rationale || '') + ' ' + (e.category || '');
    Object.keys(e.cards || {}).forEach(function (k) {
      var c = e.cards[k]; for (var a in c) if (c[a]) s += ' ' + c[a];
    });
    return s.toLowerCase();
  }
  // CARDS maps card name -> bare Scryfall id (or a full URL fallback); rebuild the image URL.
  function cardImg(name) {
    var v = CARDS[name];
    if (!v) return '';
    return /^https?:/.test(v) ? v
      : 'https://cards.scryfall.io/normal/front/' + v[0] + '/' + v[1] + '/' + v + '.jpg';
  }
  function passesRow(e) { // text + type + category + keyword metadata (NOT tier — tier is group-level)
    if (query && haystack(e).indexOf(query) === -1) return false;
    if (filt.type && e.type !== filt.type) return false;
    if (filt.category && e.category !== filt.category) return false;
    if (filt.interaction.size && !filt.interaction.has(e.interaction)) return false;
    if (filt.duration.size && !filt.duration.has(e.duration)) return false;
    if (filt.baseKeyword.size && !filt.baseKeyword.has(e.baseKeyword)) return false;
    return true;
  }
  // A group "name-matches" the query when it hits the base label or a shown variant's
  // title (NOT its rationale/category/card names). No query → always true (single bucket,
  // natural order preserved). Used to float name matches above card/rationale-only hits.
  function nameHit(g, rows) {
    if (!query) return true;
    if (g.base.toLowerCase().indexOf(query) !== -1) return true;
    return rows.some(function (m) { return m.title.toLowerCase().indexOf(query) !== -1; });
  }
  // Color filter (never sorts): no filter when all/none selected; else keep effects whose
  // pie includes a selected color (at the chosen tier, or any tier when tier === 'all').
  function passesColor(g) {
    if (!selected.size) return false;                  // no colors → dim all, prompt to pick
    if (selected.size === COLORS.length) return true;
    var rank = g.members[0].rank;
    if (tier === 'offpie') { for (var k of selected) if (rank[k]) return false; return true; }
    for (var k of selected) if (tier === 'all' ? rank[k] : rank[k] === tier) return true;
    return false;
  }

  // ----- Render rows -----
  // Three tier cells (Primary/Secondary/Tertiary); each holds color-only pills
  // for the selected colors sitting at that tier for this effect. Off-pie
  // selected colors appear in no cell.
  function tierCells(eff) {
    var buckets = { primary: [], secondary: [], tertiary: [] };
    COLORS.forEach(function (c) {   // always show every color's tier, regardless of picker
      var t = eff.rank[c.k];
      if (t && buckets[t]) buckets[t].push(c);
    });
    var LABEL = { primary: 'P', secondary: 'S', tertiary: 'T' };
    return ['primary','secondary','tertiary'].map(function (tk) {
      var pills = buckets[tk].map(function (c) {
        return '<span class="badge ' + c.k + '" title="' + c.name + '"></span>';
      }).join('');
      return '<div class="tier-cell" data-label="' + LABEL[tk] + '">' + pills + '</div>';
    }).join('');
  }
  function rowHTML(e, grouped) {
    var c = fbCounts[e.id] || { total: 0, accepted: 0 };
    return '<button class="row' + (grouped ? ' grouped' : '') + '" data-eff="' + e._i + '">' +
      '<div class="cell-main"><span class="row-name">' + esc(e.title) + '</span>' +
      '<span class="row-tags"><span class="tag">' + esc(e.type) + '</span>' +
      (e.category ? '<span class="tag">' + esc(e.category) + '</span>' : '') +
      '</span></div>' +
      '<div class="review-cell"><span class="review' + (c.accepted ? ' has-accepted' : '') + '" data-id="' + esc(e.id) + '">Review (' + c.total + ')</span></div>' +
      tierCells(e) +
    '</button>';
  }
  // Color picker only sorts (never filters). Every other filter (tier, type,
  // category, keyword, search) partitions effects into results (full opacity) and
  // filtered-out (dimmed, beneath) — nothing is ever fully hidden.
  // multi-variant groups are a collapsible <details> (summary = base name),
  // collapsed by default and auto-opened while filtering; single effects render
  // as a bare row.
  function groupWrap(g, isGroup, rows, open) {
    var inner = rows.map(function (e) { return rowHTML(e, isGroup); }).join('');
    var be = g.members[0];
    var gcounts = g.members.map(function (m) { return fbCounts[m.id] || { total: 0, accepted: 0 }; });
    var gn = gcounts.reduce(function (s, c) { return s + c.total; }, 0);
    var allGreen = gcounts.every(function (c) { return c.accepted > 0; });   // every variant has ≥1 accepted
    return isGroup ? '<details class="group"' + (open ? ' open' : '') + '><summary>' +
      '<span class="cell-main"><span class="row-name">' + esc(g.base) + '</span>' +
      '<span class="row-tags"><span class="tag">' + esc(be.type) + '</span>' +
      (be.category ? '<span class="tag">' + esc(be.category) + '</span>' : '') + '</span></span>' +
      '<div class="review-cell"><span class="review review-disabled' + (allGreen ? ' has-accepted' : '') + '" title="Expand to review each variant">Review (' + gn + ')</span></div>' +
      tierCells(be) + '</summary>' + inner + '</details>' : inner;
  }
  function render() {
    saveFilters();   // persist on every filter change (all changes call render)
    // Each section splits into a name-match bucket (top) and the rest; GROUPS is walked
    // in natural order so each bucket stays stably ordered. No query → all rows land in
    // *Top, so output matches the natural-order list exactly.
    var resTop = '', resRest = '', outTop = '', outRest = '', shown = 0, dimmed = 0;
    // groups collapse by default; any active filter/search auto-opens matching groups
    // any row-level filter can match a subset of a group's variants; auto-open so
    // matches aren't hidden inside a collapsed <details> (tier/colour are group-level)
    var filtering = !!query || !!filt.type || !!filt.category ||
      !!filt.interaction.size || !!filt.duration.size || !!filt.baseKeyword.size;
    GROUPS.forEach(function (g) {   // natural data order; color picker filters, never sorts
      var members = g.members;
      var isGroup = members.length > 1;
      var colorOk = passesColor(g);
      var res = colorOk ? members.filter(passesRow) : [];
      var out = members.filter(function (m) { return res.indexOf(m) === -1; });
      if (res.length) { var rh = groupWrap(g, isGroup, res, filtering); if (nameHit(g, res)) resTop += rh; else resRest += rh; shown += res.length; }
      if (out.length) { var oh = groupWrap(g, isGroup, out, false); if (nameHit(g, out)) outTop += oh; else outRest += oh; dimmed += out.length; }
    });
    var resHtml = resTop + resRest, outHtml = outTop + outRest;
    var html = resHtml || '<p class="empty">' +
      (selected.size ? 'No effects match these filters.' : 'Pick one or more colors to see effects.') + '</p>';
    if (outHtml) html += '<div class="group-head fo-label">Filtered out</div>' +
      '<div class="filtered-out">' + outHtml + '</div>';
    document.getElementById('list').innerHTML = html;
    document.getElementById('count').textContent =
      shown + ' effect' + (shown === 1 ? '' : 's') +
      (dimmed ? ' · ' + dimmed + ' filtered out' : '');
  }

  // ----- Detail dialog -----
  function detailHTML(eff) {
    var cols = selected.size
      ? COLORS.filter(function (c) { return selected.has(c.k); })
      : COLORS;
    // (rationale + meta now render in the sticky modal header — see openDetail)
    // order sections by this effect's tier: Primary, Secondary, Tertiary, then off-pie
    // (stable sort keeps WUBRG order within each tier)
    var TORDER = { primary: 0, secondary: 1, tertiary: 2 };
    var trank = function (c) { var v = TORDER[eff.rank[c.k]]; return v == null ? 3 : v; };
    var secs = cols.slice().sort(function (a, b) { return trank(a) - trank(b); }).map(function (c, i) {
      var t = eff.rank[c.k];
      var tilePicks = t ? ['onRate','cheapest','outdated','iconic'] : [];   // bend/break moved to their own subsections below
      var cell = eff.cards[c.k] || {};
      var arts = tilePicks.filter(function (p) { return cell[p]; }).map(function (p) {
        var name = cell[p], img = cardImg(name);
        return '<fieldset class="art"><legend>' + ARCH[p] + '</legend>' +
          (img ? '<img loading="lazy" src="' + esc(img) + '" alt="' + esc(name) + '"/>' : '') +
          '<p class="cname">' + esc(name) + '</p></fieldset>';
      }).join('');
      // Bend / Break subsections: object {1:{name,desc}} → image+description rows;
      // legacy string → a single row with no description.
      var bb = ['bend','breaks'].map(function (p) {
        var v = cell[p]; if (!v) return '';
        var items = typeof v === 'string' ? [{ name: v, desc: '' }]
          : Object.keys(v).sort(function (a, b) { return a - b; }).map(function (k) { return v[k]; });
        var rows = items.map(function (it) {
          var img = cardImg(it.name);
          return '<div class="bb-row"><div class="bb-card">' +
            (img ? '<img loading="lazy" src="' + esc(img) + '" alt="' + esc(it.name) + '"/>' : '') +
            '<span class="cname">' + esc(it.name) + '</span></div>' +
            (it.desc ? '<p class="bb-note">' + esc(it.desc) + '</p>' : '') + '</div>';
        }).join('');
        return '<fieldset class="art bb-sec' + (p === 'breaks' ? ' brk' : ' bnd') + '"><legend>' + ARCH[p] + '</legend><div class="bb-cards">' + rows + '</div></fieldset>';
      }).join('');
      var lab = t ? '<span class="tierlab tier-' + t + '">' + TIERWORD[t] + '</span>'
                  : '<span class="tierlab tier-off">Off-pie</span>';
      var body = (arts ? '<div class="art-strip">' + arts + '</div>' : '') + bb;
      return '<div class="color-sec' + (i % 2 ? ' alt' : '') + '"><h3><span class="badge ' + c.k + '" title="' + c.name + '"></span>' + c.name + lab + '</h3>' +
        (body || '<p class="no-art">No example card.</p>') + '</div>';
    }).join('');
    // 🟡 MultiColor: a tier-less section, always shown (not in the picker), after the 6 colors
    var my = eff.cards.Y;
    if (my && (my.onRate || my.outdated)) {
      var marts = ['onRate','outdated'].filter(function (p) { return my[p]; }).map(function (p) {
        var name = my[p], img = cardImg(name);
        return '<fieldset class="art"><legend>' + ARCH[p] + '</legend>' +
          (img ? '<img loading="lazy" src="' + esc(img) + '" alt="' + esc(name) + '"/>' : '') +
          '<p class="cname">' + esc(name) + '</p></fieldset>';
      }).join('');
      secs += '<div class="color-sec"><h3><span class="badge Y" title="Multicolor"></span>Multicolor</h3>' +
        '<div class="art-strip">' + marts + '</div></div>';
    }
    return secs;
  }
  var dlg = document.getElementById('detail');
  function openDetail(i) {
    var eff = COLORPIE[i];
    document.getElementById('d-title').textContent = eff.title;
    var typeEl = document.getElementById('d-type');
    typeEl.textContent = eff.type + (eff.category ? ' · ' + eff.category : '');
    document.getElementById('d-rationale').textContent = eff.rationale || '';
    // On mobile the type tag scrolls in the body (under the title); on desktop it stays in
    // the sticky header under the title. Relocate per viewport at open time.
    if (window.matchMedia('(max-width: 560px)').matches)
      document.getElementById('d-rationale').before(typeEl);   // into the scroll flow, above the rationale
    else
      document.getElementById('d-title').after(typeEl);        // back inside the title block
    document.getElementById('d-meta').innerHTML = [['Interaction', eff.interaction], ['Duration', eff.duration], ['Base keyword', eff.baseKeyword]]
      .filter(function (m) { return m[1]; })
      .map(function (m) { return '<span class="tag">' + m[0] + ': ' + esc(m[1]) + '</span>'; }).join('');
    document.getElementById('d-body').innerHTML = detailHTML(eff);
    var sf = document.getElementById('d-scryfall');
    sf.hidden = !eff.scryfall;
    if (eff.scryfall) sf.href = eff.scryfall;
    var c = fbCounts[eff.id] || { total: 0, accepted: 0 };
    var rev = document.getElementById('d-review');
    rev.href = 'review.html?id=' + encodeURIComponent(eff.id);
    rev.textContent = 'Review (' + c.total + ')';
    rev.classList.toggle('has-accepted', c.accepted > 0);
    if (typeof dlg.showModal === 'function') dlg.showModal(); else dlg.setAttribute('open','');
  }
  document.getElementById('d-close').addEventListener('click', function () { dlg.close(); });
  dlg.addEventListener('click', function (e) { if (e.target === dlg) dlg.close(); }); // backdrop

  // hover card preview (inside the dialog so it shares the modal top layer)
  var preview = document.getElementById('img-preview');
  var dBody = document.getElementById('d-body');
  function placePreview(x, y) {
    var pw = preview.offsetWidth, ph = preview.offsetHeight;
    var px = x + 24; if (px + pw > window.innerWidth - 8) px = x - 24 - pw;
    var py = Math.min(Math.max(8, y - ph / 2), window.innerHeight - ph - 8);
    preview.style.left = px + 'px'; preview.style.top = py + 'px';
  }
  dBody.addEventListener('mouseover', function (e) {
    var img = e.target.closest('.art img'); if (!img || !img.src) return;
    preview.src = img.src; preview.hidden = false; placePreview(e.clientX, e.clientY);
  });
  dBody.addEventListener('mousemove', function (e) { if (!preview.hidden) placePreview(e.clientX, e.clientY); });
  dBody.addEventListener('mouseout', function (e) { if (e.target.closest('.art img')) preview.hidden = true; });
  dlg.addEventListener('close', function () { preview.hidden = true; });

  // ----- Wire controls -----
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]; }); }

  // color picker
  var pickerEl = document.getElementById('picker');
  pickerEl.innerHTML = COLORS.map(function (c) {
    return '<button class="pick ' + c.k + '" data-k="' + c.k + '" title="' + c.name + '" aria-pressed="' + (selected.has(c.k) ? 'true' : 'false') + '">' + c.k + '</button>';
  }).join('');
  pickerEl.addEventListener('click', function (e) {
    var b = e.target.closest('.pick'); if (!b) return;
    var k = b.dataset.k;
    if (selected.has(k)) selected.delete(k); else selected.add(k);
    b.setAttribute('aria-pressed', selected.has(k) ? 'true' : 'false');
    document.getElementById('tier-note').hidden = selected.size > 0;
    render();
  });
  // double-click a color = solo it (deactivate all others)
  pickerEl.addEventListener('dblclick', function (e) {
    var b = e.target.closest('.pick'); if (!b) return;
    var k = b.dataset.k;
    selected = new Set([k]);
    [].forEach.call(pickerEl.children, function (btn) {
      btn.setAttribute('aria-pressed', btn.dataset.k === k ? 'true' : 'false');
    });
    document.getElementById('tier-note').hidden = selected.size > 0;
    render();
  });
  document.getElementById('tier-note').hidden = selected.size > 0;

  // search
  document.getElementById('search').addEventListener('input', function (e) {
    query = e.target.value.trim().toLowerCase(); render();
  });

  // tier segmented (single-select)
  var tierEl = document.getElementById('tier');
  tierEl.addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    tier = b.dataset.tier;
    [].forEach.call(tierEl.children, function (x) { x.setAttribute('aria-pressed', x === b ? 'true' : 'false'); });
    render();
  });

  // multi-select chip groups
  function buildChips(elId, values, dim) {
    var el = document.getElementById(elId);
    el.innerHTML = values.map(function (v) {
      return '<button class="chip" data-v="' + esc(v) + '" aria-pressed="false">' + esc(v) + '</button>';
    }).join('');
    el.addEventListener('click', function (e) {
      var b = e.target.closest('.chip'); if (!b) return;
      var v = b.dataset.v;
      if (filt[dim].has(v)) filt[dim].delete(v); else filt[dim].add(v);
      b.setAttribute('aria-pressed', filt[dim].has(v) ? 'true' : 'false');
      render();
    });
  }
  function uniq(getter) {
    var s = []; COLORPIE.forEach(function (e) { var v = getter(e); if (v && s.indexOf(v) === -1) s.push(v); });
    return s.sort();
  }
  // single-select native dropdowns ('' = All)
  function fillSelect(id, values, key) {
    var el = document.getElementById(id);
    el.innerHTML = '<option value="">All</option>' + values.map(function (v) {
      return '<option value="' + esc(v) + '">' + esc(v) + '</option>';
    }).join('');
    el.addEventListener('change', function () { filt[key] = el.value; render(); });
  }
  fillSelect('f-type', uniq(function (e) { return e.type; }),     'type');
  fillSelect('f-cat',  uniq(function (e) { return e.category; }), 'category');
  buildChips('f-interaction', uniq(function (e) { return e.interaction; }), 'interaction');
  buildChips('f-duration',    uniq(function (e) { return e.duration; }),    'duration');
  buildChips('f-baseKeyword', uniq(function (e) { return e.baseKeyword; }), 'baseKeyword');

  // reflect restored filter state onto the controls the build code hardcodes
  // (picker + tier-note already read `selected` during build)
  (function syncControls() {
    document.getElementById('search').value = query;
    [].forEach.call(tierEl.children, function (x) { x.setAttribute('aria-pressed', x.dataset.tier === tier ? 'true' : 'false'); });
    document.getElementById('f-type').value = filt.type;
    document.getElementById('f-cat').value = filt.category;
    [['f-interaction','interaction'], ['f-duration','duration'], ['f-baseKeyword','baseKeyword']].forEach(function (p) {
      [].forEach.call(document.getElementById(p[0]).children, function (b) {
        b.setAttribute('aria-pressed', filt[p[1]].has(b.dataset.v) ? 'true' : 'false');
      });
    });
  })();

  // row click → detail (delegation); the Review pill navigates instead
  document.getElementById('list').addEventListener('click', function (e) {
    var rev = e.target.closest('.review');
    if (rev && rev.dataset.id) { location.href = 'review.html?id=' + encodeURIComponent(rev.dataset.id); return; }
    if (rev) return;  // group summary pill: no nav — let the click bubble to expand the <details>
    var r = e.target.closest('.row'); if (!r) return;
    openDetail(+r.dataset.eff);
  });

  // feedback counts populate badges asynchronously (see module script below)
  window.applyFbCounts = function (counts) { fbCounts = counts || {}; render(); };

  // park the sticky column header just under the sticky site header
  var siteHeader = document.querySelector('.site-header');
  var listHead = document.getElementById('list-head');
  function setStickyTop() { if (siteHeader && listHead) listHead.style.top = siteHeader.offsetHeight + 'px'; }
  requestAnimationFrame(setStickyTop);   // defer the offsetHeight read off the init layout pass (avoids a forced reflow)
  window.addEventListener('resize', setStickyTop);

  render();

  // ----- ponytail self-check (data-independent): silent on pass, logs on regression -----
  (function selftest() {
    var save = selected;                  // restore after — don't desync the rendered picker
    selected = new Set(['U']);            // strict subset → color filter active
    console.assert(passesColor({ members: [{ rank: { U: 'primary' } }] }), 'in-pie passes color filter');
    console.assert(!passesColor({ members: [{ rank: { U: null } }] }), 'off-pie filtered out');
    selected = new Set();
    console.assert(!passesColor({ members: [{ rank: {} }] }), 'no colors dims all');
    selected = save;
    var qsave = query;                    // restore after — don't desync the search box
    query = 'viper';
    console.assert(nameHit({ base: 'Viperweave' }, []), 'base name-match floats up');
    console.assert(nameHit({ base: 'Deathtouch' }, [{ title: 'Ambush Viper — Has' }]), 'variant title name-match floats up');
    console.assert(!nameHit({ base: 'Deathtouch' }, [{ title: 'Deathtouch — Has' }]), 'card/rationale-only match stays in the rest bucket');
    query = '';
    console.assert(nameHit({ base: 'Anything' }, []), 'no query → single bucket');
    query = qsave;
  })();
})();
</script>
<script type="module">
// Fill the review-count badges once. Failure (e.g. Firebase not yet configured)
// is non-fatal — the page works without counts.
import { allCounts } from './assets/feedback.js';
allCounts().then(function (c) { window.applyFbCounts(c); })
  .catch(function (err) { console.warn('feedback counts unavailable:', err && err.message || err); });
</script>
</body>
</html>
